services:
  - type: web
    name: learnstack
    runtime: docker
    dockerfilePath: ./Dockerfile.app
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Not a secret — committed as config-as-code with a sensible default. Change verbosity
      # by editing this value and redeploying (unlike the dashboard-set sync:false vars above).
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: learnstack-db
    databaseName: learnstack
    user: learnstack
    plan: free
